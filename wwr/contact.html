<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Describe your Rafting site, Contact us page for a big name white water rafting company.">
    <meta name="author" content="De-valdy Belfort">

    <title>"Contact us - white water rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact us</h1>

        <section>
            <h2>Company Information</h2>
            <p><strong>Address:</strong> 123, River Lamer, Jacmel</p>
            <p><strong>Phone:</strong> (555) 123-4567</p>
            <p><strong>Email</strong> info@whitewaterrafting.com</p>

            <iframe src="https://www.google.com/maps/place/Jacmel+Ha%C3%AFti&output=embed"
              width="600" height="450" allowfullscreen="" loading="lazy"></iframe>
        </section>

        <section>
            <h2>Meet our Team</h2>

            <figure>
                <img src="images/raft1.jpg" alt="Enjoy Rafting Moment">
                <figcaption>Enjoy Rafting Moment</figcaption>
            </figure>

            <figure>
                <img src="images/raft2.jpg" alt="Water wave">
                <figcaption>Water wave</figcaption>
            </figure>

            <figure>
                <img src="images/raft3.jpg" alt="Feeling of Rafting">
                <figcaption>Feeling of Rafting</figcaption>
            </figure>

            <figure>
                <img src="images/raft4.jpg" alt="Water Feeling">
                <figcaption>Water Feeling</figcaption>
            </figure>

            <figure>
                <img src="images/raft5.jpg" alt="Water Floating">
                <figcaption>Water Floating</figcaption>
            </figure>
        </section>

        <section>
            <h2>Send us a Message</h2>

            <form>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message</p>

                <label>
                    <input type="radio" name="purpose" id="general">
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" id="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" id="suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5"></textarea>

                <label>
                    <input type="checkbox" name="newslater">
                    Please subscribe me to the newslater
                </label>

                <button type="submit">Send Message</button>

            </form>

        </section>

    </main>

    <footer>
        <p>©2026, White Water Rafting, De-valdy Belfort</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebooklogo.png" alt="Facebook Icon">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkdenlogo.png" alt="Linkden Icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagramlogo.png" alt="Instagram Incon">
            </a>
        </nav>

    </footer>


</body>

</html>
