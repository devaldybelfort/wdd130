<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact us for reservations and questions.">
    <meta name="author" content="Your Name">
    <title>Rapids White Water Rafting | Contact Us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logoofficial.jpg" alt="Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <section>
            <h1>Contact Us</h1>

            <p>Address: 123 River Road, Utah</p>
            <p>Phone: +1 800 555 1234</p>
            <p>Email: info@rapidsrafting.com</p>
        </section>

        <section class="employees">
            <img src="images/employee1.jpg" alt="Employee One">
            <img src="images/employee2.jpg" alt="Employee Two">
            <img src="images/employee3.jpg" alt="Employee Three">
        </section>

        <section>
            <form>

                <label for="fullname">Name</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="useremail">Email</label>
                <input type="email" id="useremail" name="useremail" required>

                <p>Purpose:</p>

                <label><input type="radio" name="purpose"> General Inquiry</label>
                <label><input type="radio" name="purpose"> Reservation Question</label>
                <label><input type="radio" name="purpose"> Website Suggestion</label>

                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>

                <label>
                    <input type="checkbox">
                    Subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>

            </form>
        </section>

    </main>

    <footer>
        <p>©2026 Rapids White Water Rafting | Your Name</p>
    </footer>

</body>

</html>
